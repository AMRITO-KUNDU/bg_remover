name: Deploy to HuggingFace

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          git clone https://huggingface.co/spaces/amritokundu719/Clean_Cut space

          rsync -av --exclude '.git' ./ space/

          cd space
          git add .
          git commit -m "sync from github"
          git push https://amritokundu719:$HF_TOKEN@huggingface.co/spaces/amritokundu719/Clean_Cut main